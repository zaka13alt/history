<!DOCTYPE html>
<html>
<body>
  <script src="https://unpkg.com/@mercuryworkshop/scramjet@alpha/dist/scramjet.js"></script>
  <script src="https://unpkg.com/@mercuryworkshop/scramjet-controller@latest/dist/controller.api.js"></script>
  <script src="https://unpkg.com/@mercuryworkshop/libcurl-transport@latest/dist/index.js"></script>
  <script>
    (async () => {
      const reg = await navigator.serviceWorker.register("/sw.js");
      await navigator.serviceWorker.ready;
      const worker = reg.active ?? reg.installing ?? reg.waiting;

      const transport = new window.LibcurlTransport.LibcurlClient({ wisp: "wss://valid19.lol/wisp/" });
      const { Controller, config } = window.$scramjetController;
      const base = "https://cdn.jsdelivr.net/npm/@mercuryworkshop/scramjet@alpha/dist/scramjet";
      config.scramjetPath = `${base}.js`;
      config.wasmPath = `${base}.wasm`;

      const controller = new Controller({ serviceworker: worker, transport });
      await controller.wait();
      const iframe = document.createElement("iframe");
      iframe.id = "proxy-frame";
      iframe.style.cssText = "width:100%;height:90vh"
      const frame = controller.createFrame(document.body.appendChild(iframe));
      frame.go("https://ifconfig.me");
    })();
  </script>
</body>
</html>
